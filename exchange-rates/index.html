<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exchange Rates - Taras Antoniuk</title>
    <meta name="description" content="Live ECB exchange rates powered by Financial Accounting System API by Taras Antoniuk.">
    <meta property="og:title" content="Exchange Rates - Taras Antoniuk">
    <meta property="og:description" content="Live ECB exchange rates from the Financial Accounting System API.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://tarasantoniuk.com/exchange-rates/">
    <link rel="icon" type="image/svg+xml" href="/images/favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        .currency-header {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 15px;
            box-shadow: var(--card-shadow);
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }

        .base-currency {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .base-currency-label {
            font-size: 1.2em;
            font-weight: 600;
            color: var(--primary-color);
        }

        .base-currency-value {
            font-size: 1.5em;
            font-weight: 700;
            color: var(--secondary-color);
            background: var(--bg-color);
            padding: 10px 25px;
            border-radius: 25px;
        }

        .date-selector {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .date-selector label {
            font-size: 1.1em;
            font-weight: 600;
            color: var(--primary-color);
        }

        .date-selector input[type="date"] {
            padding: 10px 20px;
            border: 2px solid var(--primary-color);
            border-radius: 25px;
            font-size: 1em;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            transition: all 0.3s ease;
            background: var(--card-bg);
            color: var(--text-color);
        }

        .date-selector input[type="date"]:focus {
            outline: none;
            border-color: var(--secondary-color);
            box-shadow: 0 0 10px rgba(102, 126, 234, 0.3);
        }

        .rates-table-container {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 15px;
            box-shadow: var(--card-shadow);
            overflow-x: auto;
        }

        .rates-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        .rates-table thead {
            background: var(--primary-gradient);
            color: white;
        }

        .rates-table th {
            padding: 15px;
            text-align: left;
            font-weight: 600;
            font-size: 1.1em;
        }

        .rates-table tbody tr {
            border-bottom: 1px solid var(--border-color);
            transition: background 0.3s ease;
        }

        .rates-table tbody tr:hover {
            background: var(--bg-color);
        }

        .rates-table td {
            padding: 15px;
            color: var(--text-secondary);
        }

        .currency-code {
            font-weight: 600;
            color: var(--primary-color);
            font-size: 1.1em;
        }

        .currency-name {
            color: var(--secondary-color);
            font-size: 0.9em;
        }

        .currency-symbol {
            color: #888;
            font-size: 0.85em;
            margin-left: 5px;
        }

        .rate-value {
            font-weight: 600;
            color: var(--text-color);
            font-size: 1.1em;
        }

        .loading {
            text-align: center;
            padding: 40px;
            font-size: 1.2em;
            color: var(--primary-color);
        }

        .error {
            background: #fee;
            border: 2px solid #fcc;
            padding: 20px;
            border-radius: 10px;
            color: #c33;
            margin: 20px 0;
        }

        body.dark-mode .error {
            background: #3d1f1f;
            border-color: #5c2f2f;
            color: #ff9999;
        }

        @media (max-width: 768px) {
            .currency-header {
                flex-direction: column;
                align-items: flex-start;
            }

            .rates-table {
                font-size: 0.9em;
            }

            .rates-table th,
            .rates-table td {
                padding: 10px;
            }
        }
    </style>
</head>
<body>

<!-- Animated background -->
<div class="animated-bg"></div>

<!-- Dark mode toggle -->
<button class="dark-mode-toggle" id="darkModeToggle" aria-label="Toggle dark mode">
    <i class="fas fa-moon"></i>
</button>

<header data-title="Exchange Rates" data-page="exchange-rates"></header>

<div class="container">
    <div class="currency-header animate-on-scroll">
        <div class="base-currency">
            <span class="base-currency-label"><i class="fas fa-euro-sign"></i> Base Currency:</span>
            <span class="base-currency-value">EUR (Euro)</span>
        </div>
        <div class="date-selector">
            <label for="rateDate"><i class="fas fa-calendar-alt"></i> Date:</label>
            <input type="date" id="rateDate" max="">
        </div>
    </div>

    <div class="rates-table-container animate-on-scroll">
        <div id="loadingMessage" class="loading"><i class="fas fa-spinner fa-spin"></i> Loading currency rates...</div>
        <div id="errorMessage" class="error" style="display: none;"></div>
        <table class="rates-table" id="ratesTable" style="display: none;">
            <thead>
            <tr>
                <th><i class="fas fa-flag"></i> Currency</th>
                <th><i class="fas fa-code"></i> Currency Code</th>
                <th><i class="fas fa-clock"></i> Last Updated</th>
                <th><i class="fas fa-chart-line"></i> Exchange Rate</th>
            </tr>
            </thead>
            <tbody id="ratesBody">
            </tbody>
        </table>
    </div>
</div>

<footer></footer>

<script src="/js/menu.js"></script>
<script src="/js/exchange-rates.js"></script>
<script src="/js/animations.js"></script>

</body>
</html>
