<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Security Dashboard - Time Tracking System</title>
    <link rel="stylesheet" href="../../css/style.css">
    <style>
        .controls {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.12);
            margin-bottom: 30px;
        }

        .datetime-input {
            display: flex;
            gap: 15px;
            align-items: flex-end;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        .input-group {
            flex: 1;
            min-width: 200px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: #667eea;
            font-weight: 600;
        }

        .input-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1em;
            transition: border-color 0.3s ease;
        }

        .input-group input:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn-primary {
            padding: 12px 40px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.5);
        }

        .btn-primary:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .btn-now {
            padding: 12px 30px;
            background: white;
            color: #667eea;
            border: 2px solid #667eea;
            border-radius: 8px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-left: 10px;
        }

        .btn-now:hover {
            background: #667eea;
            color: white;
        }

        .results {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.12);
        }

        .status-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 3px solid #f0f0f0;
            flex-wrap: wrap;
            gap: 20px;
        }

        .status-header h2 {
            margin: 0;
            border: none;
        }

        .employee-count {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px 30px;
            border-radius: 30px;
            font-size: 1.3em;
            font-weight: 700;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
        }

        .employee-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 15px;
        }

        .employee-card {
            background: linear-gradient(135deg, #f5f7fa 0%, #e3e9f0 100%);
            padding: 20px;
            border-radius: 10px;
            border-left: 4px solid #667eea;
            transition: all 0.3s ease;
        }

        .employee-card:hover {
            transform: translateX(5px);
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.2);
        }

        .employee-id {
            font-size: 0.9em;
            color: #764ba2;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .employee-name {
            font-size: 1.2em;
            color: #333;
            font-weight: 700;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }

        .empty-state .icon {
            font-size: 4em;
            margin-bottom: 20px;
        }

        .error {
            background: #fee;
            color: #c33;
            padding: 15px 20px;
            border-radius: 8px;
            border-left: 4px solid #c33;
            margin-bottom: 20px;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #667eea;
            font-size: 1.2em;
        }

        .loading::after {
            content: '...';
            animation: dots 1.5s steps(4, end) infinite;
        }

        @keyframes dots {
            0%, 20% { content: '.'; }
            40% { content: '..'; }
            60%, 100% { content: '...'; }
        }

        .back-link {
            display: inline-block;
            margin-bottom: 20px;
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .back-link:hover {
            transform: translateX(-5px);
        }

        @media (max-width: 768px) {
            .datetime-input {
                flex-direction: column;
            }

            .input-group {
                width: 100%;
            }

            .btn-now {
                width: 100%;
                margin-left: 0;
                margin-top: 10px;
            }

            .employee-list {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

<header data-title="Security Dashboard" data-page="projects"></header>

<div class="container">
    <a href="index.html" class="back-link">← Back to Time Tracking</a>

    <section class="controls">
        <h2>🔒 Who is in the Building?</h2>
        <p style="color: #555; margin-bottom: 25px;">
            Check which employees are currently present in the building at any specific time.
        </p>

        <div class="datetime-input">
            <div class="input-group">
                <label for="checkDate">Date:</label>
                <input type="date" id="checkDate" required>
            </div>
            <div class="input-group">
                <label for="checkTime">Time:</label>
                <input type="time" id="checkTime" step="1" required>
            </div>
            <div>
                <button class="btn-primary" onclick="checkPresence()">Check Presence</button>
                <button class="btn-now" onclick="setNow()">Now</button>
            </div>
        </div>

        <div id="error" style="display: none;" class="error"></div>
    </section>

    <section class="results" id="results" style="display: none;">
        <div class="status-header">
            <h2>Present Employees</h2>
            <div class="employee-count" id="employeeCount">0 employees</div>
        </div>

        <div id="loading" class="loading" style="display: none;">
            Loading employee data
        </div>

        <div id="employeeList" class="employee-list"></div>

        <div id="emptyState" class="empty-state" style="display: none;">
            <div class="icon">🏢</div>
            <p>No employees in the building at this time</p>
        </div>
    </section>
</div>

<footer></footer>

<script src="../../js/menu.js"></script>
<script>
    const API_BASE = 'https://timetracking.tarasantoniuk.com/api';

    // Set current date/time on page load
    window.addEventListener('DOMContentLoaded', () => {
        setNow();
    });

    function setNow() {
        const now = new Date();
        
        // Format date as YYYY-MM-DD
        const year = now.getFullYear();
        const month = String(now.getMonth() + 1).padStart(2, '0');
        const day = String(now.getDate()).padStart(2, '0');
        document.getElementById('checkDate').value = `${year}-${month}-${day}`;
        
        // Format time as HH:MM:SS
        const hours = String(now.getHours()).padStart(2, '0');
        const minutes = String(now.getMinutes()).padStart(2, '0');
        const seconds = String(now.getSeconds()).padStart(2, '0');
        document.getElementById('checkTime').value = `${hours}:${minutes}:${seconds}`;
    }

    async function checkPresence() {
        const dateInput = document.getElementById('checkDate').value;
        const timeInput = document.getElementById('checkTime').value;
        
        if (!dateInput || !timeInput) {
            showError('Please enter both date and time');
            return;
        }

        hideError();
        showLoading();

        try {
            // Combine date and time in ISO format
            const datetime = `${dateInput}T${timeInput}`;
            
            const response = await fetch(`${API_BASE}/time-logs/present?time=${encodeURIComponent(datetime)}`);
            
            if (!response.ok) {
                throw new Error(`API error: ${response.status}`);
            }

            const data = await response.json();
            displayResults(data);
        } catch (error) {
            console.error('Error:', error);
            showError('Failed to fetch employee data. Please check your connection and try again.');
            hideResults();
        } finally {
            hideLoading();
        }
    }

    async function displayResults(employeeIds) {
        const resultsSection = document.getElementById('results');
        const employeeList = document.getElementById('employeeList');
        const emptyState = document.getElementById('emptyState');
        const employeeCount = document.getElementById('employeeCount');

        resultsSection.style.display = 'block';
        employeeList.innerHTML = '';

        if (!employeeIds || employeeIds.length === 0) {
            emptyState.style.display = 'block';
            employeeList.style.display = 'none';
            employeeCount.textContent = '0 employees';
            return;
        }

        emptyState.style.display = 'none';
        employeeList.style.display = 'grid';
        employeeCount.textContent = `${employeeIds.length} ${employeeIds.length === 1 ? 'employee' : 'employees'}`;

        // Fetch employee details
        for (const id of employeeIds) {
            try {
                const response = await fetch(`${API_BASE}/employees/${id}`);
                if (response.ok) {
                    const employee = await response.json();
                    const card = createEmployeeCard(employee);
                    employeeList.appendChild(card);
                } else {
                    // If employee details not found, show just ID
                    const card = createEmployeeCard({ id: id, firstName: 'Employee', lastName: `#${id}` });
                    employeeList.appendChild(card);
                }
            } catch (error) {
                console.error(`Error fetching employee ${id}:`, error);
                const card = createEmployeeCard({ id: id, firstName: 'Employee', lastName: `#${id}` });
                employeeList.appendChild(card);
            }
        }
    }

    function createEmployeeCard(employee) {
        const card = document.createElement('div');
        card.className = 'employee-card';
        card.innerHTML = `
            <div class="employee-id">ID: ${employee.id}</div>
            <div class="employee-name">${employee.firstName} ${employee.lastName}</div>
        `;
        return card;
    }

    function showLoading() {
        document.getElementById('loading').style.display = 'block';
    }

    function hideLoading() {
        document.getElementById('loading').style.display = 'none';
    }

    function showError(message) {
        const errorDiv = document.getElementById('error');
        errorDiv.textContent = message;
        errorDiv.style.display = 'block';
    }

    function hideError() {
        document.getElementById('error').style.display = 'none';
    }

    function hideResults() {
        document.getElementById('results').style.display = 'none';
    }
</script>
</body>
</html>
